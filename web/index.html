<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXF Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div id="toolbar">
      <span id="app-title">DXF Viewer</span>
      <button id="btn-open" title="파일 열기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        열기
      </button>
      <button id="btn-fit" title="화면에 맞추기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
        화면 맞춤
      </button>
      <button id="btn-zoom-in" title="확대">+</button>
      <button id="btn-zoom-out" title="축소">−</button>
      <span id="zoom-label">100%</span>
      <div id="toolbar-sep"></div>
      <button id="btn-toggle-layers" title="레이어 패널 토글">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
        레이어
      </button>
      <button id="btn-toggle-points" title="점 표시/숨기기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="12" r="2" fill="currentColor" stroke="none"/>
          <circle cx="20" cy="12" r="2" fill="currentColor" stroke="none"/>
        </svg>
        점 표시
      </button>
      <button id="btn-point-opts" title="점 옵션">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
        점 옵션
      </button>
      <span id="status-text"></span>
    </div>

    <!-- Point options panel -->
    <div id="point-opts-panel" class="hidden">
      <div class="opt-row">
        <label class="opt-check-label">
          <input type="checkbox" id="opt-show-points"> 점 표시
        </label>
      </div>
      <div class="opt-sep"></div>
      <div class="opt-row">
        <span class="opt-label">직선 점</span>
        <input type="color" id="opt-line-color" value="#000000" title="직선 점 색상">
        <input type="number" id="opt-line-size" value="2" min="1" max="20" title="반지름(px)">
        <span class="opt-unit">px</span>
      </div>
      <div class="opt-row">
        <span class="opt-label">곡선 점</span>
        <input type="color" id="opt-curve-color" value="#ff0000" title="곡선 점 색상">
        <input type="number" id="opt-curve-size" value="1" min="1" max="20" title="반지름(px)">
        <span class="opt-unit">px</span>
      </div>
    </div>

    <!-- Main area -->
    <div id="main">
      <!-- Layer panel -->
      <div id="layer-panel" class="hidden">
        <div id="layer-panel-header">
          <span>레이어</span>
          <button id="btn-layers-all">전체</button>
          <button id="btn-layers-none">없음</button>
        </div>
        <div id="layer-list"></div>
      </div>

      <!-- Canvas area -->
      <div id="canvas-wrap">
        <!-- Drop zone overlay -->
        <div id="drop-overlay" class="active">
          <div id="drop-msg">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <p>DXF 파일을 여기에 드롭하거나</p>
            <label id="file-label" for="file-input">파일 선택</label>
            <input type="file" id="file-input" accept=".dxf">
          </div>
        </div>
        <canvas id="canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div id="loading-box">
      <div id="loading-spinner"></div>
      <div id="loading-text">WASM 로딩 중…</div>
    </div>
  </div>

  <!-- Emscripten WASM glue (generated by emcc) -->
  <script src="../build/dxfviewer.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
